server:
  port: 8081
spring:
  application:
    name: hmdp
  profiles:
    active: dev
  datasource:
    driver-class-name: ${hm-dp.datasource.driver-class-name}
    url: jdbc:mysql://${hm-dp.datasource.host}:${hm-dp.datasource.port}/${hm-dp.datasource.database}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${hm-dp.datasource.username}
    password: ${hm-dp.datasource.password}
  redis:
    host: ${hm-dp.redis.host}
    port: ${hm-dp.redis.port}
#    password: ${hm-dp.redis.password}
    database: ${hm-dp.redis.database}
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug